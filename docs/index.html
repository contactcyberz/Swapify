<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swapify — Échange de compétences</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #040F1E;
      color: #CBD5E1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .logo { font-size: 52px; font-weight: 800; letter-spacing: -1px; margin-bottom: 12px; }
    .logo span { color: #0EA5E9; }
    p { color: #7DB9D8; font-size: 18px; margin-bottom: 32px; text-align: center; }
    .links { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    a {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 600;
      text-decoration: none;
      font-size: 15px;
    }
    .primary { background: #0EA5E9; color: #fff; }
    .secondary { background: #091A30; border: 1px solid #0F2744; color: #7DB9D8; }
    footer { position: fixed; bottom: 24px; color: #4B6A8A; font-size: 13px; }
  </style>
</head>
<body>
  <div class="logo">Swap<span>ify</span></div>
  <p>Échange tes compétences avec ta communauté.<br/>Gratuit, sans argent, entre voisins. 🚀</p>
  <div class="links">
    <a class="primary" href="privacy.html">🔒 Politique de confidentialité</a>
    <a class="secondary" href="mailto:support@swapify.app">📩 Nous contacter</a>
  </div>
  <footer>© 2026 Swapify · Meriem Aliane · Montréal, Québec</footer>
</body>
</html>
